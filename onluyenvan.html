<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ÔN LUYỆN VĂN</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
}

.timer{
text-align:center;
font-size:30px;
margin:20px;
font-weight:bold;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
}

.box{
background:white;
padding:20px;
margin:20px auto;
max-width:900px;
border-radius:8px;
}

textarea{
width:100%;
height:200px;
font-size:16px;
padding:10px;
line-height:1.6;
resize:none;
}

.counter{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>ÔN LUYỆN VĂN</h1>


<div class="timer" id="timer">
60:00
</div>

<div style="text-align:center">

<button onclick="startTimer()">Bắt đầu</button>

<button onclick="pauseTimer()">Tạm dừng</button>

<button onclick="resetTimer()">Reset</button>

</div>


<div class="box">

<h2>Nghị luận xã hội (tối đa 200 chữ)</h2>

<textarea id="text200"></textarea>

<div id="count200" class="counter">
0 / 200 chữ
</div>

</div>



<div class="box">

<h2>Nghị luận văn học (tối đa 600 chữ)</h2>

<textarea id="text600"></textarea>

<div id="count600" class="counter">
0 / 600 chữ
</div>

</div>



<script>

function demChu(text){

text = text.replace(/[.,!?;:()"'“”]/g,'');

text = text.trim();

if(text==="") return 0;

let words = text.split(/\s+/);

return words.length;

}



function gioiHan(textareaId,counterId,max){

let textarea = document.getElementById(textareaId);

let counter = document.getElementById(counterId);

textarea.addEventListener("input",function(){

let words = textarea.value
.replace(/[.,!?;:()"'“”]/g,'')
.trim()
.split(/\s+/)
.filter(w=>w.length>0);

if(words.length>max){

textarea.value = words.slice(0,max).join(" ");

words = words.slice(0,max);

}

counter.innerText = words.length+" / "+max+" chữ";

});

}



gioiHan("text200","count200",200);

gioiHan("text600","count600",600);



let time = 60*60;

let timer;

function updateDisplay(){

let minutes = Math.floor(time/60);

let seconds = time%60;

seconds = seconds<10 ? "0"+seconds : seconds;

document.getElementById("timer").innerText =
minutes+":"+seconds;

}



function startTimer(){

if(timer) return;

timer = setInterval(function(){

if(time>0){

time--;

updateDisplay();

}else{

clearInterval(timer);

alert("Hết giờ!");

}

},1000);

}



function pauseTimer(){

clearInterval(timer);

timer=null;

}



function resetTimer(){

clearInterval(timer);

timer=null;

time = 60*60;

updateDisplay();

document.getElementById("text200").value="";
document.getElementById("text600").value="";

document.getElementById("count200").innerText="0 / 200 chữ";

document.getElementById("count600").innerText="0 / 600 chữ";

}



updateDisplay();

</script>

</body>
</html>
